# Governance API schemas

Budget:
  type: object
  description: Budget configuration
  properties:
    id:
      type: string
    max_limit:
      type: number
      description: Maximum budget in dollars
    reset_duration:
      type: string
      description: Reset duration (e.g., "30s", "5m", "1h", "1d", "1w", "1M")
    calendar_aligned:
      type: boolean
      description: When true, resets align to calendar period boundaries in UTC (not rolling from last reset)
      default: false
    last_reset:
      type: string
      format: date-time
    current_usage:
      type: number
    config_hash:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

RateLimit:
  type: object
  description: Rate limit configuration
  properties:
    id:
      type: string
    token_max_limit:
      type: integer
      format: int64
    token_reset_duration:
      type: string
    token_current_usage:
      type: integer
      format: int64
    token_last_reset:
      type: string
      format: date-time
    request_max_limit:
      type: integer
      format: int64
      nullable: true
    request_reset_duration:
      type: string
      nullable: true
    request_current_usage:
      type: integer
      format: int64
    request_last_reset:
      type: string
      format: date-time
    config_hash:
      type: string
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time

CreateBudgetRequest:
  type: object
  description: Create budget request
  required:
    - max_limit
    - reset_duration
  properties:
    max_limit:
      type: number
    reset_duration:
      type: string
    calendar_aligned:
      type: boolean
      default: false
      description: >
        When true, usage resets at the start of each calendar period in UTC instead of on a rolling window
        from last reset. Only valid with reset durations that use day, week, month, or year suffixes
        (`d`, `w`, `M`, `Y`). For example `1d` resets at midnight UTC; `1w` at Monday 00:00 UTC;
        `1M` on the first day of each month; `1Y` on January 1. Sub-day durations (e.g. `1h`) cannot use
        calendar alignment.

UpdateBudgetRequest:
  type: object
  description: Update budget request
  properties:
    max_limit:
      type: number
    reset_duration:
      type: string
    calendar_aligned:
      type: boolean
      nullable: true
      description: >
        Set to true or false to enable or disable calendar-aligned resets. Only valid with reset durations
        that use day, week, month, or year suffixes (`d`, `w`, `M`, `Y`); sub-day durations (e.g. `1h`,
        `30m`) are invalid with calendar alignment and the API rejects that combination. When enabling on
        an existing budget, current usage is reset to zero and last_reset snaps to the current period start.

CreateRateLimitRequest:
  type: object
  description: Create rate limit request
  properties:
    token_max_limit:
      type: integer
      format: int64
    token_reset_duration:
      type: string
    request_max_limit:
      type: integer
      format: int64
    request_reset_duration:
      type: string

UpdateRateLimitRequest:
  type: object
  description: Update rate limit request
  properties:
    token_max_limit:
      type: integer
      format: int64
    token_reset_duration:
      type: string
    request_max_limit:
      type: integer
      format: int64
    request_reset_duration:
      type: string

VirtualKeyProviderConfig:
  type: object
  description: Provider configuration for a virtual key
  properties:
    id:
      type: integer
    virtual_key_id:
      type: string
    provider:
      type: string
    weight:
      type: number
      nullable: true
      description: Weight for provider load balancing. Null means excluded from weighted routing.
    allowed_models:
      type: array
      items:
        type: string
    budget_id:
      type: string
    rate_limit_id:
      type: string
    budget:
      $ref: '#/Budget'
    rate_limit:
      $ref: '#/RateLimit'
    keys:
      type: array
      items:
        $ref: '#/TableKey'

VirtualKeyMCPConfig:
  type: object
  description: MCP configuration for a virtual key
  properties:
    id:
      type: integer
    mcp_client_name:
      type: string
    tools_to_execute:
      type: array
      items:
        type: string

VirtualKey:
  type: object
  description: Virtual key configuration
  properties:
    id:
      type: string
    name:
      type: string
    value:
      type: string
    description:
      type: string
    is_active:
      type: boolean
    provider_configs:
      type: array
      items:
        $ref: '#/VirtualKeyProviderConfig'
    mcp_configs:
      type: array
      items:
        $ref: '#/VirtualKeyMCPConfig'

CreateVirtualKeyRequest:
  type: object
  description: Create virtual key request
  required:
    - name
  properties:
    name:
      type: string
    description:
      type: string
    provider_configs:
      type: array
      description: Provider configurations (empty means no providers allowed, deny-by-default)
      items:
        type: object
        properties:
          provider:
            type: string
          weight:
            type: number
            nullable: true
            description: Weight for load balancing. Null means excluded from weighted routing.
          allowed_models:
            type: array
            items:
              type: string
          budget:
            $ref: '#/CreateBudgetRequest'
          rate_limit:
            $ref: '#/CreateRateLimitRequest'
          key_ids:
            type: array
            items:
              type: string
    mcp_configs:
      type: array
      description: MCP configurations (empty means no MCP tools allowed, deny-by-default)
      items:
        type: object
        properties:
          mcp_client_name:
            type: string
          tools_to_execute:
            type: array
            items:
              type: string
    team_id:
      type: string
    customer_id:
      type: string
    budget:
      $ref: '#/CreateBudgetRequest'
    rate_limit:
      $ref: '#/CreateRateLimitRequest'
    is_active:
      type: boolean

UpdateVirtualKeyRequest:
  type: object
  description: Update virtual key request
  properties:
    name:
      type: string
    description:
      type: string
    provider_configs:
      type: array
      items:
        type: object
        properties:
          id:
            type: integer
          provider:
            type: string
          weight:
            type: number
            nullable: true
            description: Weight for load balancing. Null means excluded from weighted routing.
          allowed_models:
            type: array
            items:
              type: string
          budget:
            $ref: '#/UpdateBudgetRequest'
          rate_limit:
            $ref: '#/UpdateRateLimitRequest'
          key_ids:
            type: array
            items:
              type: string
    mcp_configs:
      type: array
      items:
        type: object
        properties:
          id:
            type: integer
          mcp_client_name:
            type: string
          tools_to_execute:
            type: array
            items:
              type: string
    team_id:
      type: string
    customer_id:
      type: string
    budget:
      $ref: '#/UpdateBudgetRequest'
    rate_limit:
      $ref: '#/UpdateRateLimitRequest'
    is_active:
